<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Avatar</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0c0828, #1a1a3d);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 900px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 255, 166, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 166, 0.2);
        }

        .header {
            padding: 15px 20px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            font-size: 12px;
            color: #00FFA6;
        }

        iframe {
            width: 100%;
            border: none;
            aspect-ratio: 16/9;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <span>AI Assistant</span>
            <span class="status">● Live</span>
        </div>   

<iframe src="https://embed.liveavatar.com/v1/0558243e-3e69-42ca-be3d-042e9f121600" allow="microphone" title="LiveAvatar Embed" style="aspect-ratio: 16/9;"></iframe>


    </div>

</body>
</html>
